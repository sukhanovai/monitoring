repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # PR9: согласованность версии в config/settings.py, gradle.properties,
  # ссылках на prerelease APK и заголовках исходников.
  - repo: local
    hooks:
      - id: bump-version-check
        name: bump_version.py --check
        entry: python scripts/bump_version.py --check
        language: system
        pass_filenames: false
        # Запускать только при правке файлов, где живёт версия — иначе hook
        # бьёт каждый коммит, что раздражает на правках теста или README.
        files: |
          (?x)^(
            config/settings\.py |
            android-client/gradle\.properties |
            README\.md |
            docs/android_mobile_app\.md |
            scripts/bump_version\.py |
            main\.py |
            (bot|core|lib|modules|extensions|config|scripts)/.+\.py |
            docs/.+\.md
          )$
