name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Compile all
        run: python -m compileall -q .

      - name: Pytest (smoke, no runtime deps)
        # Сейчас CI прогоняет только лёгкие smoke-тесты, не требующие
        # paramiko/telegram/matrix-nio. Полный smoke-импорт по
        # core.monitor_core / bot.handlers / modules.mail_monitor добавится
        # в отдельном PR вместе с настройкой apt/pip установки runtime.
        run: pytest
