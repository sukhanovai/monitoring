name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps (libolm for matrix-nio)
        run: sudo apt-get update && sudo apt-get install -y libolm-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # wmi работает только на Windows — пропускаем при установке на Linux CI.
          grep -v '^wmi' requirements.txt > /tmp/req-linux.txt
          pip install -r /tmp/req-linux.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Compile all
        run: python -m compileall -q .

      - name: Pytest
        run: pytest
